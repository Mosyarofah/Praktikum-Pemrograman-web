<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum CSS</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* Tampilan Umum */
        body {
            background-color: #add8e6;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            font-size: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        p {
            background-color: #d3d3d3;
            color: black;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
    
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .grid-container div {
            border: 2px solid black;
            padding: 10px;
            height: 150px;
            border-radius: 10px;
        }
        
        .box1 {
            background-color: #ff9999;
        }
        
        .box2 {
            background-color: #99ff99;
        }
        
        .box3 {
            background-color: #9999ff;
        }
        
        @media only screen and (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    
        @media only screen and (max-width: 480px) {
            h1 {
                font-size: 28px;
            }
            
            p {
                padding: 15px;
            }
            
            .grid-container {
                grid-template-columns: 1fr;
            }
            
            .grid-container div {
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Praktikum CSS</h1>
        
        <p>
            Ini adalah paragraf dengan latar belakang abu-abu muda. 
            Paragraf ini memiliki padding yang cukup agar nyaman dibaca 
            dan sudut yang membulat.
        </p>
        
        <div class="grid-container">
            <div class="box1">Kotak 1</div>
            <div class="box2">Kotak 2</div>
            <div class="box3">Kotak 3</div>
        </div>
    </div>
</body>
</html>
