<!DOCTYPE html>
<html>
<head>
    <style>
        p {
            color: navy;
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        .highlight-yellow {
            background-color: yellow;
            border-radius: 5px;
        }
        
        .highlight-green {
            background-color: lightgreen;
            border-radius: 5px;
        }
        
        .highlight-pink {
            background-color: pink;
            border-radius: 5px;
        }

        #judul-utama {
            font-size: 36px;
            color: darkblue;
            text-align: center;
            font-family: 'Georgia', serif;
        }
        
        #judul-kedua {
            font-size: 28px;
            color: darkgreen;
            text-align: left;
            font-family: 'Georgia', serif;
        }
    </style>
</head>
<body>
    <h1 id="judul-utama">Judul Halaman Utama</h1>
    
    <p>Ini adalah paragraf biasa tanpa highlight.</p>
    
    <p class="highlight-yellow">Paragraf ini memiliki latar belakang kuning.</p>
    
    <p class="highlight-green">Paragraf ini memiliki latar belakang hijau muda.</p>
    
    <p class="highlight-pink">Paragraf ini memiliki latar belakang pink.</p>
    
    <p class="highlight-yellow">Paragraf dengan highlight kuning lagi.</p>
</body>
</html>
